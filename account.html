<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        html { scroll-behavior: smooth; }
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #333; line-height: 1.6; }
        
        /* Hero Section */
        .hero-section { padding: 80px 0 80px 0; background: #ffffff;}
        .highlight-name { font-family: 'Playfair Display', serif; font-size: 5rem; font-weight: 700; color: #0d6efd; line-height: 1.1; margin-bottom: 1.5rem; }

        /* General Section Styling */
        section { padding: 90px 0; border-bottom: 1px solid #eee; scroll-margin-top: 60px; }
        .section-title { font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: #0d6efd; margin-bottom: 40px; font-size: 0.9rem; text-align: center; }
        
        /* Progress Bar Customization */
        .progress { height: 8px; margin-bottom: 20px; background-color: #e9ecef; border-radius: 10px; }
        .skill-label { font-size: 0.85rem; font-weight: 600; margin-bottom: 5px; display: block; }

        /* Resume Cards */
        .resume-card { border-left: 3px solid #0d6efd; padding: 5px 0 5px 25px; margin-bottom: 40px; }
        .date-badge { font-size: 0.9rem; background: #e7f0ff; color: #0d6efd; padding: 4px 12px; border-radius: 20px; font-weight: 600; }
        
        /* Project Card Styling */
        .project-card { border: 1px solid #eee; border-radius: 12px; transition: transform 0.2s; height: 100%; }
        .project-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        
        /* Back to Portfolio Button */
        .back-to-portfolio {
            margin-bottom: 30px;
        }
    </style>
  </head>
  <body class="bg-light d-flex align-items-center" style="min-height: 100vh;">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-11 col-sm-8 col-md-6 col-lg-4">
                
                <!-- Back to Portfolio Button -->
                <div class="back-to-portfolio text-center">
                    <a href="index.html" class="btn btn-outline-secondary btn-sm">
                        <i class="bi bi-arrow-left me-2"></i>Back to Portfolio
                    </a>
                </div>

                <div class="card shadow-lg border-0 rounded-4">
                    <div class="card-header bg-primary text-white text-center py-3 border-0">
                        <h5 class="mb-0 fw-bold">Account Portal</h5>
                    </div>
                    
                    <div class="card-body p-4">
                        <div class="btn-group w-100 mb-4 shadow-sm" role="group">
                            <button class="btn btn-outline-primary active btn-sm" id="btn-login-view" onclick="showView('login')">Login</button>
                            <button class="btn btn-outline-primary btn-sm" id="btn-signup-view" onclick="showView('signup')">Sign Up</button>
                        </div>

                        <div id="view-login">
                            <div class="form-floating mb-3">
                                <input type="text" id="login-user" class="form-control" placeholder="Username">
                                <label for="login-user">Username</label>
                            </div>
                            <div class="form-floating mb-3">
                                <input type="password" id="login-pass" class="form-control" placeholder="Password">
                                <label for="login-pass">Password</label>
                            </div>
                            <button class="btn btn-primary w-100 py-2 fw-bold" id="login-btn" onclick="handleLogin()">
                                <span id="login-spinner" class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                                <span id="login-text">Sign In</span>
                            </button>
                        </div>

                        <div id="view-signup" style="display:none;">
                            <div class="form-floating mb-3">
                                <input type="text" id="reg-user" class="form-control" placeholder="Username">
                                <label for="reg-user">Desired Username</label>
                            </div>
                            <div class="form-floating mb-3">
                                <input type="email" id="reg-email" class="form-control" placeholder="name@example.com">
                                <label for="reg-email">Email Address</label>
                            </div>
                            <div class="form-floating mb-3">
                                <input type="password" id="reg-pass" class="form-control" placeholder="Password">
                                <label for="reg-pass">Password</label>
                            </div>
                            <button class="btn btn-success w-100 py-2 fw-bold" id="signup-btn" onclick="handleSignUp()">
                                <span id="signup-spinner" class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                                <span id="signup-text">Create Account</span>
                            </button>
                        </div>

                        <div id="auth-status" class="mt-3 text-center small fw-bold" style="min-height: 20px;"></div>
                    </div>               
                    
                </div> 
            </div>
        </div>
    </div>

<script>
    // ========================================
    // CONFIGURATION - UPDATE WITH YOUR URL
    // ========================================
    const BACKEND_URL = "https://script.google.com/macros/s/AKfycbyFWgLxKP4ujjsJUdMpgNuOgIE6i67TSzOmpNLNL77OCKB3OO9Bob_4Nat5XVhku2kG/exec";

    function showView(view) {
        document.getElementById('view-login').style.display = view === 'login' ? 'block' : 'none';
        document.getElementById('view-signup').style.display = view === 'signup' ? 'block' : 'none';
        document.getElementById('btn-login-view').classList.toggle('active', view === 'login');
        document.getElementById('btn-signup-view').classList.toggle('active', view === 'signup');
    }

    function handleSignUp() {
        const userData = {
            username: document.getElementById('reg-user').value,
            email: document.getElementById('reg-email').value,
            password: document.getElementById('reg-pass').value
        };
        
        const btn = document.getElementById('signup-btn');
        const spinner = document.getElementById('signup-spinner');
        const btnText = document.getElementById('signup-text');
        const status = document.getElementById('auth-status');

        // Validation
        if (!userData.username || !userData.email || !userData.password) {
            status.className = "mt-3 text-center small fw-bold text-danger";
            status.innerText = "Please fill in all fields.";
            return;
        }

        // 1. Start Loading State
        btn.disabled = true;
        spinner.classList.remove('d-none');
        btnText.innerText = " Creating...";
        status.innerText = "";

        // 2. Build FormData properly
        const formData = new URLSearchParams();
        formData.append('action', 'signUp');
        formData.append('username', userData.username);
        formData.append('email', userData.email);
        formData.append('password', userData.password);

        // 3. Send to Google Apps Script via Fetch API
        fetch(BACKEND_URL, {
            method: "POST",
            redirect: "follow", // Explicitly follow Google Apps Script 302 redirects
            headers: {
                "Content-Type": "application/x-www-form-urlencoded"
            },
            body: formData
        })
        .then(res => res.text())
        .then(text => {
            const res = JSON.parse(text);
            
            // 4. End Loading State
            btn.disabled = false;
            spinner.classList.add('d-none');
            btnText.innerText = "Create Account";

            // 5. Show Response
            status.className = "mt-3 text-center small fw-bold " + (res.success ? "text-success" : "text-danger");
            status.innerText = res.message;
            
            // 6. Auto-switch to login on success
            if(res.success) {
                setTimeout(() => {
                    showView('login');
                    document.getElementById('reg-user').value = '';
                    document.getElementById('reg-email').value = '';
                    document.getElementById('reg-pass').value = '';
                }, 2000);
            }
        })
        .catch(err => {
            btn.disabled = false;
            spinner.classList.add('d-none');
            btnText.innerText = "Create Account";
            status.className = "mt-3 text-center small fw-bold text-danger";
            status.innerText = "Network error: " + err.message;
        });
    }

    function handleLogin() {
        const user = document.getElementById('login-user').value;
        const pass = document.getElementById('login-pass').value;
        const status = document.getElementById('auth-status');
        
        // UI Elements
        const btn = document.getElementById('login-btn');
        const spinner = document.getElementById('login-spinner');
        const btnText = document.getElementById('login-text');

        // Validation
        if (!user || !pass) {
            status.className = "mt-3 text-center small fw-bold text-danger";
            status.innerText = "Please enter username and password.";
            return;
        }

        // 1. Start Loading State
        btn.disabled = true;
        spinner.classList.remove('d-none');
        btnText.innerText = " Verifying...";
        status.innerText = "";

        // 2. Build FormData properly
        const formData = new URLSearchParams();
        formData.append('action', 'login');
        formData.append('username', user);
        formData.append('password', pass);

        // 3. Send to Google Apps Script via Fetch API
        fetch(BACKEND_URL, {
            method: "POST",
            redirect: "follow", // Explicitly follow Google Apps Script 302 redirects
            headers: {
                "Content-Type": "application/x-www-form-urlencoded"
            },
            body: formData
        })
        .then(res => res.text())
        .then(text => {
            const res = JSON.parse(text);
            
            // 4. End Loading State
            btn.disabled = false;
            spinner.classList.add('d-none');
            btnText.innerText = "Sign In";

            // 5. Show Response
            if(res.success) {
                status.className = "mt-3 text-center small fw-bold text-success";
                status.innerText = "Welcome back, " + res.username + "!";
                
                // 6. Clear fields and store session
                setTimeout(() => {
                    document.getElementById('login-user').value = '';
                    document.getElementById('login-pass').value = '';
                    status.innerText = "Login successful!";
                }, 1000);
            } else {
                status.className = "mt-3 text-center small fw-bold text-danger";
                status.innerText = res.message;
            }
        })
        .catch(err => {
            btn.disabled = false;
            spinner.classList.add('d-none');
            btnText.innerText = "Sign In";
            status.className = "mt-3 text-center small fw-bold text-danger";
            status.innerText = "Network error: " + err.message;
        });
    }
</script>
  </body>
</html>
